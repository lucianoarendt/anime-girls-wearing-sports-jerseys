name: Validate Entries

on:
  pull_request:
    paths:
      - "entries/**"
      - "images/**"
      - "cmd/**"
      - "go.mod"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run validator
        run: go run .
